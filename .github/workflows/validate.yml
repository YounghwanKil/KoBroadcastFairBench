name: validate

on:
  push:
  pull_request:

jobs:
  validate-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate public pilot labels
        run: python scripts/validate_labels.py
